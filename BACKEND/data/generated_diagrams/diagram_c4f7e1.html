<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AERIS System Architecture</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/reactflow@11.10.3/dist/umd/index.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/reactflow@11.10.3/dist/style.css" />
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { 
        margin: 0; padding: 0; height: 100vh; 
        background: transparent; 
        font-family: 'Inter', system-ui, sans-serif; 
    }
    #root { width: 100%; height: 100%; border-radius: 12px; overflow: hidden; }
    .title-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #8b5cf6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        pointer-events: none;
        background-color: rgba(15,15,30,0.8);
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid rgba(139,92,246,0.3);
    }
    # .close-btn {
    #     position: absolute;
    #     top: 20px;
    #     right: 20px;
    #     z-index: 100;
    #     background-color: #ff4444;
    #     color: white;
    #     border: none;
    #     border-radius: 8px;
    #     padding: 8px 16px;
    #     font-size: 16px;
    #     font-weight: bold;
    #     cursor: pointer;
    #     box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    #     transition: 0.2s;
    # }
    # .close-btn:hover {
    #     background-color: #ff2222;
    #     transform: scale(1.05);
    # }
    
    /* Dark mode overrides for react flow background */
    .react-flow__background { background-color: rgba(10, 10, 25, 0.95); }
    .react-flow__controls button { background-color: #1a1a2e; border-bottom-color: #333; fill: #eee; }
    .react-flow__controls button:hover { background-color: #2a2a4e; }
  </style>
</head>
<body>
  <div class="title-overlay">AERIS System Architecture</div>
  <button class="close-btn" onclick="window.close()">✖ Close</button>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;
    const { ReactFlow, Background, Controls, applyNodeChanges, applyEdgeChanges, MarkerType } = window.ReactFlow;

    const initialData = {"title": "AERIS System Architecture", "nodes": [{"id": "start", "data": {"label": "Start"}, "position": {"x": 0, "y": 0}, "type": "default", "style": {"background": "#F1EFE8", "color": "#444441", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "ingestion", "data": {"label": "Data Ingestion"}, "position": {"x": 250, "y": 0}, "type": "default", "style": {"background": "#EEEDFE", "color": "#3C3489", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "processing", "data": {"label": "Data Processing"}, "position": {"x": 500, "y": 0}, "type": "default", "style": {"background": "#EEEDFE", "color": "#3C3489", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "storage", "data": {"label": "Data Storage"}, "position": {"x": 750, "y": 0}, "type": "default", "style": {"background": "#EEEDFE", "color": "#3C3489", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "analysis", "data": {"label": "Data Analysis"}, "position": {"x": 1000, "y": 0}, "type": "default", "style": {"background": "#EEEDFE", "color": "#3C3489", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "visualization", "data": {"label": "Data Visualization"}, "position": {"x": 1250, "y": 0}, "type": "default", "style": {"background": "#EEEDFE", "color": "#3C3489", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}, {"id": "end", "data": {"label": "End"}, "position": {"x": 1500, "y": 0}, "type": "default", "style": {"background": "#F1EFE8", "color": "#444441", "borderRadius": "10px", "padding": "10px", "border": "1px solid rgba(255,255,255,0.2)", "boxShadow": "0 4px 15px rgba(0,0,0,0.3)"}, "className": "node-type"}], "edges": [{"id": "start-ingestion", "source": "start", "target": "ingestion", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}, {"id": "ingestion-processing", "source": "ingestion", "target": "processing", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}, {"id": "processing-storage", "source": "processing", "target": "storage", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}, {"id": "storage-analysis", "source": "storage", "target": "analysis", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}, {"id": "analysis-visualization", "source": "analysis", "target": "visualization", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}, {"id": "visualization-end", "source": "visualization", "target": "end", "label": "", "animated": true, "style": {"strokeWidth": 2, "stroke": "#3C3489"}}]};
    
    // Process edges to ensure nice arrows and styling
    const processedEdges = (initialData.edges || []).map((e, index) => ({
      ...e,
      markerEnd: { 
          type: MarkerType.ArrowClosed, 
          color: e.style?.stroke || '#8b5cf6',
          width: 20,
          height: 20
      },
      style: {
          ...e.style,
          stroke: e.style?.stroke || '#8b5cf6',
          strokeWidth: e.style?.strokeWidth || 2
      }
    }));

    // Process nodes to ensure text contrasts well
    const processedNodes = (initialData.nodes || []).map(n => {
        // If node style has background, ensure color is readable
        let style = { ...n.style };
        if (!style.padding) style.padding = '12px 20px';
        if (!style.borderRadius) style.borderRadius = '12px';
        if (!style.fontSize) style.fontSize = '14px';
        if (!style.fontWeight) style.fontWeight = '500';
        if (!style.boxShadow) style.boxShadow = '0 4px 15px rgba(0,0,0,0.2)';
        if (!style.border) style.border = '1px solid rgba(255,255,255,0.1)';
        
        return { ...n, style };
    });

    function Flow() {
      const [nodes, setNodes] = useState(processedNodes);
      const [edges, setEdges] = useState(processedEdges);

      const onNodesChange = useCallback((changes) => setNodes((nds) => applyNodeChanges(changes, nds)), []);
      const onEdgesChange = useCallback((changes) => setEdges((eds) => applyEdgeChanges(changes, eds)), []);

      return (
        <ReactFlow
          nodes={nodes}
          edges={edges}
          onNodesChange={onNodesChange}
          onEdgesChange={onEdgesChange}
          fitView
          fitViewOptions={{ padding: 0.2 }}
          minZoom={0.2}
          maxZoom={2}
          defaultEdgeOptions={{ animated: true }}
        >
          <Background color="#333" gap={16} size={1} />
          <Controls />
        </ReactFlow>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Flow />);
  </script>
</body>
</html>
